<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مستند مشترك — Civil Engineering Suite</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background:#f4f6f8; margin:0; padding:0; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .share-card { background:#fff; border-radius:12px; box-shadow:0 4px 18px rgba(0,0,0,0.08); padding:32px; max-width:520px; width:92%; }
  h1 { font-size:20px; margin:0 0 6px; }
  .muted { color:#666; font-size:13px; margin:0 0 18px; }
  .field { margin-bottom:14px; }
  label { display:block; margin-bottom:6px; font-size:13px; color:#333; }
  input[type=password] { width:100%; padding:9px 10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; }
  .btn { padding:9px 18px; border:none; border-radius:6px; background:#2563eb; color:#fff; font-size:14px; cursor:pointer; }
  .btn:hover { background:#1d4ed8; }
  .btn-secondary { background:#eee; color:#333; margin-inline-start:8px; }
  .btn-secondary:hover { background:#e0e0e0; }
  .error { color:#c0392b; margin-top:10px; font-size:13px; }
  .doc-meta p { margin:4px 0; font-size:14px; }
  .doc-meta strong { color:#111; }
  .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; background:#e7f4ec; color:#245c3d; }
</style>
</head>
<body>
  <div class="share-card" id="share-root">
    <h1>مستند مشترك</h1>
    <p class="muted">تم مشاركة هذا الرابط معك عبر نظام إدارة المستندات — Civil Engineering Suite</p>
    <div id="share-body">جارِ التحقق من الرابط...</div>
  </div>

<script>
const token = window.location.pathname.split('/share/')[1];
const bodyEl = document.getElementById('share-body');

async function openLink(password) {
  const res = await fetch('/api/dms/share/open', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, password: password || null }),
  });
  const data = await res.json();
  if (!res.ok || data.success === false) throw new Error(data.error || 'تعذّر فتح الرابط');
  return data.data;
}

function renderPasswordForm(errorMsg) {
  bodyEl.innerHTML = `
    <div class="field">
      <label>هذا الرابط محمي بكلمة مرور</label>
      <input type="password" id="share-password" placeholder="أدخل كلمة المرور" />
    </div>
    ${errorMsg ? `<div class="error">${errorMsg}</div>` : ''}
    <button class="btn" id="share-submit">فتح المستند</button>
  `;
  document.getElementById('share-submit').addEventListener('click', async () => {
    const pwd = document.getElementById('share-password').value;
    try {
      const data = await openLink(pwd);
      renderDocument(data);
    } catch (e) {
      renderPasswordForm(e.message);
    }
  });
}

function renderDocument(data) {
  const doc = data.document;
  const canDownload = ['download', 'edit'].includes(data.permission);
  bodyEl.innerHTML = `
    <div class="doc-meta">
      <p><span class="badge">${doc.doc_type_label || '-'}</span></p>
      <p><strong>العنوان:</strong> ${doc.title}</p>
      <p><strong>رقم المستند:</strong> ${doc.document_number}</p>
      <p><strong>الوصف:</strong> ${doc.description || '-'}</p>
      <p><strong>الإصدار الحالي:</strong> v${doc.current_version_number} — ${doc.file_name || '-'} (${doc.file_size_human || '-'})</p>
    </div>
    ${canDownload ? '<button class="btn" id="share-download">تنزيل الملف</button>' : '<p class="muted">هذا الرابط للاطلاع فقط ولا يسمح بتنزيل الملف.</p>'}
  `;
  const dlBtn = document.getElementById('share-download');
  if (dlBtn) {
    dlBtn.addEventListener('click', async () => {
      dlBtn.textContent = 'جارِ التنزيل...';
      dlBtn.disabled = true;
      try {
        const pwd = document.getElementById('share-password')?.value || null;
        const res = await fetch('/api/dms/share/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pwd }),
        });
        const result = await res.json();
        if (!res.ok || result.success === false) throw new Error(result.error || 'تعذّر التنزيل');
        const link = document.createElement('a');
        link.href = `data:application/octet-stream;base64,${result.data.content_base64}`;
        link.download = result.data.file_name;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        dlBtn.textContent = 'تنزيل الملف';
        dlBtn.disabled = false;
      } catch (e) {
        dlBtn.textContent = 'تنزيل الملف';
        dlBtn.disabled = false;
        alert(e.message);
      }
    });
  }
}

(async () => {
  if (!token) {
    bodyEl.innerHTML = '<div class="error">رابط غير صحيح</div>';
    return;
  }
  try {
    const data = await openLink(null);
    renderDocument(data);
  } catch (e) {
    if (e.message.includes('كلمة المرور')) {
      renderPasswordForm();
    } else {
      bodyEl.innerHTML = `<div class="error">${e.message}</div>`;
    }
  }
})();
</script>
</body>
</html>
